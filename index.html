<style>
:root {
  --bg: #0a0a0f;
  --surface: rgba(18,18,26,0.85);
  --border: #1e1e2e;
  --accent: #ff4d2e;
  --accent2: #ffb347;
  --accent3: #4dffb4;
  --text: #e8e8f0;
  --muted: #555570;
  --work: #ff4d2e;
  --short: #4dffb4;
  --long: #4d9fff;
  --ramadan: #c9a84c;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Space Mono', monospace;
  background: var(--bg);
  color: var(--text);
  position: relative;
  /* iOS safe area */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
/* iOS standalone fake fullscreen */
.ios-fullscreen .app-container {
  position: fixed !important;
  top: 0; left: 0; right: 0; bottom: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 9999;
  overflow: hidden;
}

/* ===== WEATHER BACKGROUND ===== */
#weatherBg {
  position: fixed; inset:0; z-index:0;
  overflow: hidden;
  transition: background 3s;
}
/* Sun/Clear */
#weatherBg.clear {
  background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 30%, #415a77 60%, #778da9 100%);
}
#weatherBg.clear .sun {
  position: absolute; top:12%; right:15%;
  width:120px; height:120px; border-radius:50%;
  background: radial-gradient(circle, #ffd700 30%, #ff8c00 70%, transparent 100%);
  box-shadow: 0 0 80px 30px rgba(255,200,0,0.3), 0 0 200px 80px rgba(255,150,0,0.15);
  animation: sunPulse 4s ease-in-out infinite;
}
@keyframes sunPulse {
  0%,100% { transform:scale(1); box-shadow: 0 0 80px 30px rgba(255,200,0,0.3); }
  50% { transform:scale(1.05); box-shadow: 0 0 100px 40px rgba(255,200,0,0.4); }
}
.sun-ray {
  position:absolute; top:50%; left:50%;
  width:300px; height:2px;
  background: linear-gradient(90deg, rgba(255,200,0,0.4), transparent);
  transform-origin: 0 0;
  animation: rayRotate 20s linear infinite;
}
@keyframes rayRotate { to { transform: rotate(360deg); } }

/* Rain */
#weatherBg.rain {
  background: linear-gradient(180deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
}
.raindrop {
  position: absolute; top:-20px;
  width: 2px; background: linear-gradient(transparent, rgba(100,149,237,0.6));
  animation: rainFall linear infinite;
  opacity: 0.6;
}
@keyframes rainFall {
  to { transform: translateY(110vh); }
}

/* Snow */
#weatherBg.snow {
  background: linear-gradient(180deg, #1a1a2e 0%, #2d3a4a 50%, #4a5568 100%);
}
.snowflake {
  position: absolute; top: -10px;
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.8);
  animation: snowFall linear infinite;
  filter: blur(1px);
}
@keyframes snowFall {
  to { transform: translateY(110vh) translateX(50px) rotate(360deg); }
}

/* Cloudy */
#weatherBg.cloudy {
  background: linear-gradient(180deg, #1a1a2e 0%, #2d3436 50%, #636e72 100%);
}
.cloud {
  position: absolute;
  background: radial-gradient(ellipse, rgba(150,150,170,0.15) 0%, transparent 70%);
  border-radius: 50%;
  animation: cloudDrift linear infinite;
}
@keyframes cloudDrift {
  from { transform: translateX(-200px); }
  to { transform: translateX(calc(100vw + 200px)); }
}

/* ===== LAYOUT ===== */
.app-container {
  position: relative; z-index:1;
  height: 100vh; display: flex; flex-direction: column;
}

/* Header */
header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 20px;
  background: rgba(10,10,15,0.5);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.logo {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  letter-spacing: 6px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-right { display:flex; gap:8px; align-items:center; }
.theme-toggle, .fullscreen-btn {
  width:36px; height:36px; background:var(--surface); border:1px solid var(--border);
  border-radius:4px; cursor:pointer; font-size:1rem;
  display:flex; align-items:center; justify-content:center;
  transition: all 0.3s; color: var(--text); flex-shrink:0;
}
.theme-toggle:hover, .fullscreen-btn:hover { border-color:var(--muted); }

/* User chip */
.user-chip {
  display:flex; align-items:center; gap:6px; background:var(--surface);
  border:1px solid var(--border); border-radius:4px; padding:5px 10px;
  cursor:pointer; transition:border-color 0.2s; position:relative;
}
.user-chip:hover { border-color:var(--muted); }
.user-avatar { width:22px; height:22px; border-radius:50%; object-fit:cover; }
.user-name { font-size:0.6rem; letter-spacing:1px; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.user-dropdown { position:absolute; top:calc(100% + 4px); right:0; background:var(--surface); border:1px solid var(--border); border-radius:4px; min-width:140px; z-index:100; display:none; backdrop-filter:blur(10px); }
.user-chip:hover .user-dropdown { display:block; }
.user-dropdown-item { padding:8px 12px; font-size:0.6rem; letter-spacing:1px; cursor:pointer; border:none; background:none; color:var(--text); width:100%; text-align:left; font-family:'Space Mono',monospace; text-transform:uppercase; }
.user-dropdown-item:hover { background:rgba(255,255,255,0.05); }
.user-dropdown-item.danger { color:var(--accent); }

/* Main content */
.main-content {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding: 20px; gap: 30px; overflow-y: auto;
}

/* Timer Section */
.timer-section {
  display:flex; flex-direction:column; align-items:center; gap:14px;
}
.mode-tabs {
  display:flex; gap:0; border:1px solid var(--border); border-radius:4px; overflow:hidden;
  background: var(--surface); backdrop-filter:blur(8px);
}
.mode-tab {
  padding:8px 18px; background:transparent; border:none; color:var(--muted);
  font-family:'Space Mono',monospace; font-size:0.6rem; letter-spacing:2px;
  text-transform:uppercase; cursor:pointer; transition:all 0.3s;
  border-right:1px solid var(--border); position:relative;
}
.mode-tab:last-child { border-right:none; }
.mode-tab::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  transform:scaleX(0); transition:transform 0.3s;
}
.mode-tab[data-mode="work"]::after { background:var(--work); }
.mode-tab[data-mode="short"]::after { background:var(--short); }
.mode-tab[data-mode="long"]::after { background:var(--long); }
.mode-tab.active { color:var(--text); background:rgba(255,255,255,0.03); }
.mode-tab.active::after { transform:scaleX(1); }
.mode-tab[data-mode="work"].active { color:var(--work); }
.mode-tab[data-mode="short"].active { color:var(--short); }
.mode-tab[data-mode="long"].active { color:var(--long); }

/* Clock */
.clock-wrap {
  position:relative; width:min(300px, 70vw); height:min(300px, 70vw);
  cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
}
.clock-svg { width:100%; height:100%; transform:rotate(-90deg); }
.clock-bg-ring { fill:none; stroke:rgba(255,255,255,0.06); stroke-width:3; }
.clock-progress {
  fill:none; stroke-width:3; stroke-linecap:round;
  transition: stroke-dashoffset 1s linear, stroke 0.5s;
  filter: drop-shadow(0 0 8px currentColor);
}
.clock-center {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:4px;
}
.time-display {
  font-family:'Bebas Neue',cursive; font-size:clamp(3rem,10vw,5rem);
  letter-spacing:4px; line-height:1; transition:color 0.5s;
}
.time-label {
  font-size:0.55rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase;
}
.session-indicator { display:flex; gap:4px; margin-top:2px; }
.session-dot {
  width:5px; height:5px; border-radius:50%; background:var(--border); transition:background 0.3s;
}
.session-dot.done { background:var(--accent); }
.session-dot.current { background:var(--accent2); animation:dotPulse 1s ease-in-out infinite; }
@keyframes dotPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.4);} }

.clock-hint {
  font-size:0.55rem; letter-spacing:1.2px; color:var(--muted);
  text-align:center; opacity:0.7; transition:opacity 0.3s;
}
.clock-wrap.running ~ .clock-hint { opacity:0; }

/* Small control icons */
.mini-controls { display:flex; gap:8px; }
.mini-btn {
  width:32px; height:32px; background:var(--surface); border:1px solid var(--border);
  border-radius:4px; color:var(--muted); cursor:pointer; font-size:0.85rem;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
  backdrop-filter:blur(8px);
}
.mini-btn:hover { color:var(--text); border-color:var(--muted); }

/* Pulse when running */
@keyframes ringPulse {
  0% { box-shadow: 0 0 0 0 rgba(255,77,46,0.3); }
  100% { box-shadow: 0 0 0 15px rgba(255,77,46,0); }
}
.clock-wrap.running::after {
  content:''; position:absolute; inset:-8px; border-radius:50%;
  animation: ringPulse 2s ease-out infinite; pointer-events:none;
}

/* ===== RAMADAN CARD ===== */
.ramadan-card {
  background: var(--surface); backdrop-filter:blur(12px);
  border:1px solid rgba(201,168,76,0.2); border-radius:8px;
  padding:20px; min-width:220px; max-width:280px;
  display: none; /* hidden outside Ramadan */
}
.ramadan-card.visible { display:block; }
.ramadan-header {
  display:flex; align-items:center; gap:8px; margin-bottom:14px;
  padding-bottom:10px; border-bottom:1px solid rgba(201,168,76,0.15);
}
.ramadan-icon { font-size:1.3rem; }
.ramadan-title {
  font-family:'Bebas Neue',cursive; font-size:1.1rem; letter-spacing:3px;
  color:var(--ramadan);
}
.ramadan-day {
  font-size:0.55rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase;
  margin-left:auto;
}
.ramadan-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.03);
}
.ramadan-label { font-size:0.6rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
.ramadan-time { font-family:'Bebas Neue',cursive; font-size:1.4rem; letter-spacing:2px; color:var(--text); }
.ramadan-countdown {
  margin-top:14px; padding:10px; background:rgba(201,168,76,0.08);
  border:1px solid rgba(201,168,76,0.15); border-radius:4px; text-align:center;
}
.countdown-label { font-size:0.5rem; letter-spacing:2px; color:var(--ramadan); text-transform:uppercase; margin-bottom:4px; }
.countdown-time {
  font-family:'Bebas Neue',cursive; font-size:1.8rem; letter-spacing:3px; color:var(--ramadan);
}

/* ===== NOTIFICATION ===== */
.notification {
  position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-100px);
  background:var(--surface); backdrop-filter:blur(12px);
  border:1px solid var(--accent); border-radius:4px; padding:10px 20px;
  font-size:0.7rem; letter-spacing:1px; z-index:1000;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap; box-shadow:0 0 30px rgba(255,77,46,0.2);
}
.notification.show { transform:translateX(-50%) translateY(0); }

/* Status bar */
.status-bar {
  position:fixed; top:0; left:0; right:0; height:2px; z-index:999; transition:background 0.5s;
}
.status-bar.work { background:linear-gradient(90deg, var(--work), var(--accent2)); }
.status-bar.short { background:var(--short); }
.status-bar.long { background:var(--long); }

/* ===== AUTH WALL ===== */
.auth-wall {
  position:fixed; inset:0; background:rgba(10,10,15,0.97); z-index:2000;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.4s; backdrop-filter:blur(8px);
}
.auth-wall.visible { opacity:1; pointer-events:all; }
.auth-card {
  background:var(--surface); border:1px solid var(--border); border-radius:6px;
  padding:40px 36px; max-width:380px; width:90%; text-align:center;
  position:relative; overflow:hidden; backdrop-filter:blur(12px);
}
.auth-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--accent), var(--accent2)); }
.auth-card-logo { font-family:'Bebas Neue',cursive; font-size:2.5rem; letter-spacing:8px; background:linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
.auth-card-sub { font-size:0.55rem; letter-spacing:3px; color:var(--muted); margin-bottom:24px; text-transform:uppercase; }
.auth-desc { font-size:0.65rem; color:var(--muted); line-height:1.7; margin-bottom:24px; }
.auth-desc strong { color:var(--accent2); }
.btn-google {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:12px 20px; background:#fff; color:#333; border:none; border-radius:4px;
  font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:2px; font-weight:700;
  cursor:pointer; transition:all 0.2s; text-transform:uppercase;
}
.btn-google:hover { background:#f0f0f0; transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,0,0,0.4); }
.btn-google svg { width:18px; height:18px; flex-shrink:0; }
.auth-skip { margin-top:12px; background:none; border:none; color:var(--muted); font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:2px; cursor:pointer; text-transform:uppercase; text-decoration:underline; display:block; width:100%; }
.auth-skip:hover { color:var(--text); }

/* ===== LIGHT THEME ===== */
body.light { --bg:#f5f0e8; --surface:rgba(255,254,249,0.85); --border:#e0d8cc; --accent:#e63b1f; --accent2:#e08c00; --accent3:#00a878; --text:#1a1a2e; --muted:#8a8070; --work:#e63b1f; --short:#00a878; --long:#1a6fbd; }
body.light .auth-wall { background:rgba(245,240,232,0.97); }
body.light header { background:rgba(245,240,232,0.5); }

let currentLang = localStorage.getItem('tikitak_lang') || 'en';

function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key; }

function applyLang() {
  document.documentElement.lang = currentLang;
  document.getElementById('langBtn').textContent = currentLang.toUpperCase();
  // Update data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // Update data-i18n-html elements (HTML content)
  document.querySelectorAll('[data-i18n-html]').forEach(el => {

  });
  // Update mode label
  if (typeof state !== 'undefined') {
    const labels = { work: t('workTime'), short: t('shortTime'), long: t('longTime') };

  }
}

function toggleLang() {
  const langs = ['en', 'ru', 'uz'];
  currentLang = langs[(langs.indexOf(currentLang) + 1) % langs.length];
  localStorage.setItem('tikitak_lang', currentLang);
  applyLang();
  // Re-update Ramadan (for translated labels)
  if (typeof updateRamadan === 'function') updateRamadan();
}

// ============================================================
// STATE
// ============================================================
const CIRCUMFERENCE = 2 * Math.PI * 140;
let state = {
  mode:'work', running:false, timeLeft:0, totalTime:0,
  sessionCount:0, pomodoroNumber:1, targetEndTime:null,
  settings:{ work:25, short:5, long:15, autoSwitch:true }
};
let tickInterval = null;

// ============================================================
// PERSISTENCE
// ============================================================
function saveState() {
  localStorage.setItem('zaman_state', JSON.stringify({
    mode:state.mode, running:state.running, timeLeft:state.timeLeft,
    totalTime:state.totalTime, sessionCount:state.sessionCount,
    pomodoroNumber:state.pomodoroNumber, targetEndTime:state.targetEndTime,
    settings:state.settings, savedAt:Date.now()
  }));
}
function loadState() {
  const raw = localStorage.getItem('zaman_state');
  if (!raw) return;
  try {
    const saved = JSON.parse(raw);
    if (saved.running && saved.targetEndTime) {
      const remaining = Math.floor((saved.targetEndTime - Date.now()) / 1000);
      saved.timeLeft = Math.max(0, remaining);
      if (saved.timeLeft === 0) { Object.assign(state, saved); handleSessionEnd(true); return; }
    }
    Object.assign(state, saved);
    updateModeUI(); updateDisplay();
    if (state.running) {
      tickInterval = setInterval(tick, 1000);
      document.getElementById('clockWrap').classList.add('running');
      document.getElementById('clockHint').textContent = t('clickPause');
    }
  } catch(e) { console.warn('State load failed', e); }
}

// ============================================================
// ANALYTICS
// ============================================================
function getTodayKey() { return new Date().toISOString().slice(0,10); }
function getAnalytics() { const r=localStorage.getItem('zaman_analytics'); return r?JSON.parse(r):{}; }
function recordPomodoro() {
  const k=getTodayKey(), a=getAnalytics(); a[k]=(a[k]||0)+1;
  localStorage.setItem('zaman_analytics',JSON.stringify(a));
}

// ============================================================
// TICK MARKS
// ============================================================
function drawTickMarks() {
  const g = document.getElementById('tickMarks');
  for (let i=0;i<60;i++) {
    const angle=(i/60)*360, rad=(angle-90)*Math.PI/180;
    const r1=i%5===0?128:134, r2=140;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',150+r1*Math.cos(rad)); line.setAttribute('y1',150+r1*Math.sin(rad));
    line.setAttribute('x2',150+r2*Math.cos(rad)); line.setAttribute('y2',150+r2*Math.sin(rad));
    line.setAttribute('stroke',i%5===0?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.03)');
    line.setAttribute('stroke-width',i%5===0?'2':'1');
    g.appendChild(line);
  }
}

// ============================================================
// TIMER CORE
// ============================================================
function getModeTime(mode) {
  const s=state.settings;
  return mode==='work'?s.work*60:mode==='short'?s.short*60:s.long*60;
}
function switchMode(mode) {
  if (state.running) stopTimer();
  state.mode=mode; state.timeLeft=getModeTime(mode); state.totalTime=state.timeLeft;
  state.targetEndTime=null;
  updateModeUI(); updateDisplay(); saveState();
}
function updateModeUI() {
  document.querySelectorAll('.mode-tab').forEach(tab=>tab.classList.toggle('active',tab.dataset.mode===state.mode));
  const labels={work:t('workTime'),short:t('shortTime'),long:t('longTime')};
  const colors={work:'var(--work)',short:'var(--short)',long:'var(--long)'};
  document.getElementById('modeLabel').textContent=labels[state.mode];
  document.getElementById('timeDisplay').style.color=colors[state.mode];
  document.getElementById('progressArc').style.stroke=colors[state.mode];
  document.getElementById('statusBar').className='status-bar '+state.mode;
  updateSessionDots();
}
function updateDisplay() {
  const mins=Math.floor(state.timeLeft/60), secs=state.timeLeft%60;
  const str=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  document.getElementById('timeDisplay').textContent=str;
  document.title=str+' — TIKITAK';
  const total=state.totalTime||getModeTime(state.mode);
  const offset=CIRCUMFERENCE*(1-state.timeLeft/total);
  document.getElementById('progressArc').style.strokeDashoffset=offset;
}
function updateSessionDots() {
  const c=document.getElementById('sessionDots'); c.innerHTML='';
  for(let i=0;i<4;i++) {
    const d=document.createElement('div'); d.className='session-dot';
    if(i<state.pomodoroNumber-1) d.classList.add('done');
    else if(i===state.pomodoroNumber-1&&state.mode==='work') d.classList.add('current');
    c.appendChild(d);
  }
}
function toggleTimer() {
  if(state.running) stopTimer(); else startTimer();
}
function startTimer() {
  if(state.timeLeft===0){ state.timeLeft=getModeTime(state.mode); state.totalTime=state.timeLeft; }
  state.running=true;
  state.targetEndTime=Date.now()+state.timeLeft*1000;
  document.getElementById('clockWrap').classList.add('running');
  document.getElementById('clockHint').textContent=t('clickPause');
  tickInterval=setInterval(tick,1000);
  requestWakeLock(); saveState();
}
function stopTimer() {
  state.running=false; state.targetEndTime=null;
  clearInterval(tickInterval); tickInterval=null;
  document.getElementById('clockWrap').classList.remove('running');
  document.getElementById('clockHint').textContent=t('clickResume');
  if(!document.fullscreenElement) releaseWakeLock(); saveState();
}
function resetTimer() {
  if(state.running) stopTimer();
  state.timeLeft=getModeTime(state.mode); state.totalTime=state.timeLeft; state.targetEndTime=null;
  document.getElementById('clockHint').textContent=t('clickStart');
  updateDisplay(); saveState();
}
function skipSession() { if(state.running) stopTimer(); handleSessionEnd(false); }
function tick() {
  if(state.targetEndTime) {
    state.timeLeft=Math.max(0, Math.round((state.targetEndTime-Date.now())/1000));
  } else if(state.timeLeft>0) { state.timeLeft--; }
  updateDisplay();
  if(state.timeLeft<=0) handleSessionEnd(false);
  else if(state.timeLeft%10===0) saveState();
}
function handleSessionEnd(silent) {
  clearInterval(tickInterval); tickInterval=null;
  state.running=false; state.targetEndTime=null;
  document.getElementById('clockWrap').classList.remove('running');
  document.getElementById('clockHint').textContent=t('clickStart');
  if(!document.fullscreenElement) releaseWakeLock();
  if(state.mode==='work') {
    state.sessionCount++; recordPomodoro();
    if(!silent) { playAlertSound(); notify(t('pomoDone')); }
    if(state.pomodoroNumber>=4) {
      state.pomodoroNumber=1;
      if(state.settings.autoSwitch) setTimeout(()=>switchMode('long'),500);
    } else {
      state.pomodoroNumber++;
      if(state.settings.autoSwitch) setTimeout(()=>switchMode('short'),500);
    }
  } else {
    if(!silent) { playAlertSound(); notify(t('breakDone')); }
    if(state.settings.autoSwitch) setTimeout(()=>switchMode('work'),500);
  }
  updateSessionDots(); saveState();
}

// ============================================================
// SOUND — Alert on timer end
// ============================================================
let audioCtx=null;
function getAudioCtx(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playTone(freq,dur,type='sine',gain=0.5,delay=0){
  try{
    const ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type=type;
    o.frequency.setValueAtTime(freq,ctx.currentTime+delay);
    g.gain.setValueAtTime(0,ctx.currentTime+delay);
    g.gain.linearRampToValueAtTime(gain,ctx.currentTime+delay+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);
    o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+dur);
  }catch(e){}
}
function playAlertSound(){
  // Loud, pleasant chime
  playTone(880,2,'sine',0.6);
  playTone(1046,1.8,'sine',0.5,0.15);
  playTone(1318,2,'sine',0.5,0.3);
  playTone(1568,2.5,'sine',0.4,0.5);
  playTone(880,2,'sine',0.3,0.8);
  // Repeat after a second
  setTimeout(()=>{
    playTone(880,2,'sine',0.5);
    playTone(1318,2,'sine',0.4,0.2);
    playTone(1568,2,'sine',0.4,0.4);
  },1500);
}

// ============================================================
// WEATHER ENGINE
// ============================================================
let currentWeather = 'clear';
let rainAudioNodes = null;

async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.3&longitude=69.28&current_weather=true');
    const d = await r.json();
    const code = d.current_weather.weathercode;
    if([61,63,65,66,67,80,81,82,95,96,99].includes(code)) currentWeather='rain';
    else if([71,73,75,77,85,86].includes(code)) currentWeather='snow';
    else if([45,48].includes(code)) currentWeather='cloudy';
    else if([1,2,3].includes(code)) currentWeather='cloudy';
    else currentWeather='clear';
    renderWeather();
  } catch(e) { currentWeather='clear'; renderWeather(); }
}

function renderWeather() {
  const bg=document.getElementById('weatherBg');
  const el=document.getElementById('weatherElements');
  bg.className=currentWeather; el.innerHTML='';
  stopRainAudio();

  if(currentWeather==='rain') {
    for(let i=0;i<80;i++){
      const drop=document.createElement('div'); drop.className='raindrop';
      drop.style.left=Math.random()*100+'%';
      drop.style.height=(15+Math.random()*25)+'px';
      drop.style.animationDuration=(0.4+Math.random()*0.6)+'s';
      drop.style.animationDelay=Math.random()*2+'s';
      drop.style.opacity=0.3+Math.random()*0.5;
      el.appendChild(drop);
    }
    startRainAudio();
  } else if(currentWeather==='snow') {
    for(let i=0;i<50;i++){
      const flake=document.createElement('div'); flake.className='snowflake';
      flake.style.left=Math.random()*100+'%';
      const size=3+Math.random()*6; flake.style.width=size+'px'; flake.style.height=size+'px';
      flake.style.animationDuration=(4+Math.random()*6)+'s';
      flake.style.animationDelay=Math.random()*5+'s';
      flake.style.opacity=0.3+Math.random()*0.6;
      el.appendChild(flake);
    }
  } else if(currentWeather==='cloudy') {
    for(let i=0;i<6;i++){
      const cloud=document.createElement('div'); cloud.className='cloud';
      const w=200+Math.random()*300, h=80+Math.random()*60;
      cloud.style.width=w+'px'; cloud.style.height=h+'px';
      cloud.style.top=(5+Math.random()*40)+'%';
      cloud.style.animationDuration=(30+Math.random()*40)+'s';
      cloud.style.animationDelay=(-Math.random()*40)+'s';
      el.appendChild(cloud);
    }
  } else { // clear
    const sun=document.createElement('div'); sun.className='sun';
    for(let i=0;i<8;i++){
      const ray=document.createElement('div'); ray.className='sun-ray';
      ray.style.transform=`rotate(${i*45}deg)`; ray.style.animationDelay=(-i*2.5)+'s';
      sun.appendChild(ray);
    }
    el.appendChild(sun);
  }
}

function startRainAudio(){
  try{
    const ctx=getAudioCtx();
    const bufferSize=2*ctx.sampleRate;
    const noiseBuffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate);
    const output=noiseBuffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) output[i]=(Math.random()*2-1);
    const whiteNoise=ctx.createBufferSource();
    whiteNoise.buffer=noiseBuffer; whiteNoise.loop=true;
    const filter=ctx.createBiquadFilter();
    filter.type='lowpass'; filter.frequency.value=400;
    const gain=ctx.createGain(); gain.gain.value=0.04;
    whiteNoise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    whiteNoise.start();
    rainAudioNodes={source:whiteNoise,gain,filter};
  }catch(e){}
}
function stopRainAudio(){
  if(rainAudioNodes){try{rainAudioNodes.source.stop();}catch(e){} rainAudioNodes=null;}
}

// ============================================================
// RAMADAN LOGIC
// ============================================================
function updateRamadan() {
  const now=new Date();
  const today=now.toISOString().slice(0,10);
  const entry=RAMADAN_2026.find(r=>r.d===today);
  const card=document.getElementById('ramadanCard');

  if(!entry){ card.classList.remove('visible'); return; }
  card.classList.add('visible');

  const dayNum=RAMADAN_2026.indexOf(entry)+1;
  document.getElementById('ramadanDay').textContent=currentLang==='uz'?dayNum+t('dayLabel'):t('dayLabel')+' '+dayNum;
  document.getElementById('saharTime').textContent=entry.s;
  document.getElementById('iftorTime').textContent=entry.i;

  // Parse times
  const [sh,sm]=entry.s.split(':').map(Number);
  const [ih,im]=entry.i.split(':').map(Number);
  const saharDate=new Date(now); saharDate.setHours(sh,sm,0,0);
  const iftorDate=new Date(now); iftorDate.setHours(ih,im,0,0);

  let label,diff;
  if(now<saharDate){ label=t('untilSuhoor'); diff=saharDate-now; }
  else if(now<iftorDate){ label=t('untilIftar'); diff=iftorDate-now; }
  else {
    // After iftor — check next day's sahar
    const nextIdx=RAMADAN_2026.indexOf(entry)+1;
    if(nextIdx<RAMADAN_2026.length){
      const next=RAMADAN_2026[nextIdx];
      const [nh,nm]=next.s.split(':').map(Number);
      const nextSahar=new Date(now); nextSahar.setDate(nextSahar.getDate()+1); nextSahar.setHours(nh,nm,0,0);
      label=t('untilSuhoor'); diff=nextSahar-now;
    } else { label=t('ramadanEnd'); diff=0; }
  }

  document.getElementById('countdownLabel').textContent=label;
  if(diff>0){
    const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    document.getElementById('countdownTime').textContent=
      String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  } else { document.getElementById('countdownTime').textContent='--:--:--'; }
}

// ============================================================
// NOTIFICATIONS
// ============================================================
function notify(msg){
  const el=document.getElementById('notification');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3500);
  if('Notification' in window && Notification.permission==='granted'){
    new Notification('TIKITAK',{body:msg,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">⏱</text></svg>'});
  }
}

// ============================================================
// WAKE LOCK — always keep screen on while app is visible
// ============================================================
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    if (wakeLock) return; // already active
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => {
      wakeLock = null;
      // Auto re-request if page is still visible
      if (!document.hidden) setTimeout(requestWakeLock, 1000);
    });
  } catch(e) {}
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  clearTimeout(_wakeLockTimer);
}

// Always request when page becomes visible
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) requestWakeLock();
});

// Request immediately on load
requestWakeLock();

// ============================================================
// FULLSCREEN
// ============================================================
// Detect iOS
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isStandalone = window.navigator.standalone === true;

let iosFakeFullscreen = false;

function toggleFullscreen() {
  const btn = document.getElementById('fullscreenBtn');
  if (isIOS) {
    // iOS doesn't support Fullscreen API — use CSS fake fullscreen
    iosFakeFullscreen = !iosFakeFullscreen;
    document.body.classList.toggle('ios-fullscreen', iosFakeFullscreen);
    btn.textContent = iosFakeFullscreen ? '✕' : '⛶';
    if (iosFakeFullscreen) requestWakeLock();
    else if (!state.running) releaseWakeLock();
  } else {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  }
}

document.addEventListener('fullscreenchange',()=>{
  document.getElementById('fullscreenBtn').textContent=document.fullscreenElement?'✕':'⛶';
  // Keep screen on in fullscreen
  if(document.fullscreenElement) requestWakeLock();
  else if(!state.running) releaseWakeLock();
});

// If opened as PWA (standalone), auto wake lock
if (isStandalone) { window.addEventListener('load', ()=>requestWakeLock()); }

// ============================================================
// VISIBILITY — recalculate on return
// ============================================================
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden && state.running && state.targetEndTime){
    state.timeLeft=Math.max(0, Math.round((state.targetEndTime-Date.now())/1000));
    if(state.timeLeft<=0) handleSessionEnd(false);
    else updateDisplay();
  }
  // Re-request wake lock
  if(!document.hidden && state.running) requestWakeLock();
});

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown',(e)=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();toggleTimer();}
  if(e.code==='KeyR') resetTimer();
  if(e.code==='Digit1') switchMode('work');
  if(e.code==='Digit2') switchMode('short');
  if(e.code==='Digit3') switchMode('long');
  if(e.code==='KeyF') toggleFullscreen();
});

// ============================================================
// FIREBASE AUTH
// ============================================================
const FREE_POMODOROS=3; let currentUser=null;
let guestPomos=parseInt(localStorage.getItem('zaman_guest_pomos')||'0');
function checkAuthWall(){if(currentUser)return;if(guestPomos>=FREE_POMODOROS)showAuthWall();}
function showAuthWall(){document.getElementById('authWall').classList.add('visible');}
function hideAuthWall(){document.getElementById('authWall').classList.remove('visible');}
function skipAuth(){hideAuthWall();notify(t('limitedMode'));}

async function firebaseLogin(){
  const btn=document.getElementById('googleLoginBtn');
  const hdrBtn=document.getElementById('headerLoginBtn');
  if(btn){btn.textContent=t('signingIn');btn.disabled=true;}
  if(hdrBtn){hdrBtn.textContent='...';hdrBtn.disabled=true;}
  try{
    const fb=window._fb; if(!fb){console.error('Firebase not loaded');return;}
    await fb.signInWithPopup(fb.auth,fb.provider);
  }catch(e){
    console.error('Auth error:',e.code,e.message);
    // Fallback to redirect for mobile/blocked popups
    if(e.code==='auth/popup-blocked'||e.code==='auth/popup-closed-by-user'){
      try{ await window._fb.signInWithRedirect(window._fb.auth,window._fb.provider); }catch(e2){}
    }
    if(btn){btn.innerHTML=t('googleLogin');btn.disabled=false;}
    if(hdrBtn){hdrBtn.textContent='Sign In';hdrBtn.disabled=false;}
  }
}
async function firebaseLogout(){
  const fb=window._fb;if(!fb)return;await fb.signOut(fb.auth);
  currentUser=null;updateUserUI(null);notify(t('loggedOut'));
}
function updateUserUI(user){
  const slot=document.getElementById('headerUserSlot'),cw=document.getElementById('userChipWrap');
  const hdrLogin=document.getElementById('headerLoginBtn');
  if(user){
    document.getElementById('userAvatar').src=user.photoURL||'';
    document.getElementById('userName').textContent=user.displayName?.split(' ')[0]||'User';
    cw.style.display='block';slot.appendChild(cw);hideAuthWall();
    if(hdrLogin) hdrLogin.style.display='none';
  }else{
    cw.style.display='none';slot.innerHTML='';
    if(hdrLogin) hdrLogin.style.display='';
  }
}
async function cloudSaveAnalytics(){
  if(!currentUser||!window._fb) return;
  try{
    const fb=window._fb;
    await fb.setDoc(fb.doc(fb.db,'users',currentUser.uid),{
      analytics:getAnalytics(),settings:state.settings,updatedAt:Date.now(),
      displayName:currentUser.displayName,email:currentUser.email
    },{merge:true});
  }catch(e){}
}
async function cloudLoadData(){
  if(!currentUser||!window._fb) return;
  try{
    const fb=window._fb,snap=await fb.getDoc(fb.doc(fb.db,'users',currentUser.uid));
    if(snap.exists()){
      const data=snap.data();
      if(data.analytics){
        const local=getAnalytics(),merged={...data.analytics};
        Object.keys(local).forEach(k=>merged[k]=Math.max(merged[k]||0,local[k]||0));
        localStorage.setItem('zaman_analytics',JSON.stringify(merged));
      }
      if(data.settings) Object.assign(state.settings,data.settings);
    }
    notify(t('cloudLoaded'));
  }catch(e){}
}
function initFirebaseAuth(){
  if(!window._fb){setTimeout(initFirebaseAuth,200);return;}
  // Check redirect result (for mobile auth fallback)
  window._fb.getRedirectResult(window._fb.auth).catch(()=>{});
  window._fb.onAuthStateChanged(window._fb.auth,async(user)=>{
    currentUser=user;updateUserUI(user);
    if(user){guestPomos=0;localStorage.removeItem('zaman_guest_pomos');hideAuthWall();
      await cloudLoadData();setInterval(cloudSaveAnalytics,120000);
    }else checkAuthWall();
  });
}
// Override recordPomodoro for guest tracking
const _origRecord=recordPomodoro;
window.recordPomodoro=function(){
  _origRecord();
  if(!currentUser){guestPomos++;localStorage.setItem('zaman_guest_pomos',guestPomos);checkAuthWall();}
  else{clearTimeout(window._syncTimer);window._syncTimer=setTimeout(cloudSaveAnalytics,3000);}
};

// ============================================================
(function init(){
  drawTickMarks(); loadState();
  if(!state.timeLeft){state.timeLeft=getModeTime('work');state.totalTime=state.timeLeft;state.mode='work';}
  applyLang(); updateModeUI(); updateDisplay();
  if('Notification' in window && Notification.permission==='default') Notification.requestPermission();
  setInterval(()=>{if(state.running) saveState();},5000);
  // Weather
  fetchWeather(); setInterval(fetchWeather,1800000);
  // Ramadan
  updateRamadan(); setInterval(updateRamadan,1000);
  // Theme
  initTheme();
  // Firebase
  initFirebaseAuth();
})();
