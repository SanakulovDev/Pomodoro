name: Deploy to tikitak.uz

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update sitemap lastmod date
        run: sed -i "s|<lastmod>.*</lastmod>|<lastmod>$(date +%Y-%m-%d)</lastmod>|" sitemap.xml

      - name: Deploy via SSH (git pull)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/Pomodoro
            git pull origin main

      - name: Notify Telegram on success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>TIKITAK deploy muvaffaqiyatli!</b>%0A%0A🌐 <a href='https://tikitak.uz'>tikitak.uz</a>%0A👤 ${{ github.actor }}%0A📝 ${{ github.event.head_commit.message }}%0A🕐 $(TZ='Asia/Tashkent' date +'%Y-%m-%d %H:%M') (Toshkent)"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>TIKITAK deploy xato!</b>%0A%0A👤 ${{ github.actor }}%0A📝 ${{ github.event.head_commit.message }}%0A🔗 <a href='https://github.com/${{ github.repository }}/actions'>Logni ko'rish</a>"